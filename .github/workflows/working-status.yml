name: Working Status Management

on:
  issues:
    types: [labeled, unlabeled]

jobs:
  manage-working-status:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
      
    steps:
      - name: Handle Working Label Changes
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PROJECT_TOKEN || github.token }}
          script: |
            const CONFIG = {
              PROJECT_NUMBER: 4,
              PROJECT_OWNER: "braydenanderson2014",
              LABELS: {
                WORKING: "working"
              },
              FIELDS: {
                STATUS: "Status",
                TYPE: "Type",
                REOPENED_ISSUE: "Reopened Issue"
              },
              STATUS_VALUES: {
                ISSUE_IN_PROGRESS: "(Issue) In Progress",
                FEATURE_IN_PROGRESS: "(Feature) In Progress",
                DOCUMENTATION_IN_PROGRESS: "(Documentation) In Progress",
                GENERAL_IN_PROGRESS: "(General) In Progress",
                TO_TRIAGE: "Triage",
                BACKLOG: "Backlog",
                DOCUMENTATION_REQUEST: "Documentation Request",
                GENERAL_QUESTION: "General Question"
              }
            };
            
            // Get issue details
            const issue = context.payload.issue;
            const action = context.payload.action;
            const label = context.payload.label;
            
            console.log(`🏷️ Processing ${action} action for issue #${issue.number}`);
            
            // Check if this is related to the working label
            if (!label || label.name !== CONFIG.LABELS.WORKING) {
              console.log(`ℹ️ Label change not related to working label - skipping`);
              return;
            }
            
            // Function to get project item ID for an issue
            async function getProjectItemId(issueNumber) {
              try {
                const query = `
                  query($owner: String!, $number: Int!, $projectNumber: Int!) {
                    user(login: $owner) {
                      projectV2(number: $projectNumber) {
                        id
                        items(first: 100) {
                          nodes {
                            id
                            content {
                              ... on Issue {
                                number
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                `;
                
                const result = await github.graphql(query, {
                  owner: CONFIG.PROJECT_OWNER,
                  number: issueNumber,
                  projectNumber: CONFIG.PROJECT_NUMBER
                });
                
                const items = result.user.projectV2.items.nodes;
                const projectItem = items.find(item => 
                  item.content && item.content.number === issueNumber
                );
                
                return projectItem ? projectItem.id : null;
              } catch (error) {
                console.error(`❌ Error getting project item ID: ${error.message}`);
                return null;
              }
            }
            
            // Function to get project and field information
            async function getProjectInfo() {
              try {
                const query = `
                  query($owner: String!, $projectNumber: Int!) {
                    user(login: $owner) {
                      projectV2(number: $projectNumber) {
                        id
                        fields(first: 20) {
                          nodes {
                            ... on ProjectV2Field {
                              id
                              name
                            }
                            ... on ProjectV2SingleSelectField {
                              id
                              name
                              options {
                                id
                                name
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                `;
                
                const result = await github.graphql(query, {
                  owner: CONFIG.PROJECT_OWNER,
                  projectNumber: CONFIG.PROJECT_NUMBER
                });
                
                return result.user.projectV2;
              } catch (error) {
                console.error(`❌ Error getting project info: ${error.message}`);
                return null;
              }
            }
            
            // Function to update project status
            async function updateProjectStatus(projectItemId, newStatus) {
              try {
                const projectInfo = await getProjectInfo();
                if (!projectInfo) {
                  throw new Error('Could not retrieve project information');
                }
                
                // Find status field
                const statusField = projectInfo.fields.nodes.find(field => 
                  field.name === CONFIG.FIELDS.STATUS
                );
                
                if (!statusField) {
                  throw new Error(`Status field "${CONFIG.FIELDS.STATUS}" not found`);
                }
                
                // Find status option
                const statusOption = statusField.options?.find(option => 
                  option.name === newStatus
                );
                
                if (!statusOption) {
                  throw new Error(`Status option "${newStatus}" not found`);
                }
                
                // Update the project item
                const mutation = `
                  mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: ProjectV2FieldValue!) {
                    updateProjectV2ItemFieldValue(input: {
                      projectId: $projectId
                      itemId: $itemId
                      fieldId: $fieldId
                      value: $value
                    }) {
                      projectV2Item {
                        id
                      }
                    }
                  }
                `;
                
                await github.graphql(mutation, {
                  projectId: projectInfo.id,
                  itemId: projectItemId,
                  fieldId: statusField.id,
                  value: {
                    singleSelectOptionId: statusOption.id
                  }
                });
                
                console.log(`✅ Updated project status to "${newStatus}" for issue #${issue.number}`);
                return true;
                
              } catch (error) {
                console.error(`❌ Error updating project status: ${error.message}`);
                return false;
              }
            }
            
            // Function to add issue to project if not already added
            async function ensureIssueInProject() {
              try {
                // First check if issue is already in project
                let projectItemId = await getProjectItemId(issue.number);
                
                if (projectItemId) {
                  console.log(`ℹ️ Issue #${issue.number} already in project`);
                  return projectItemId;
                }
                
                // Add issue to project
                const projectInfo = await getProjectInfo();
                if (!projectInfo) {
                  throw new Error('Could not retrieve project information');
                }
                
                const mutation = `
                  mutation($projectId: ID!, $contentId: ID!) {
                    addProjectV2ItemByContentId(input: {
                      projectId: $projectId
                      contentId: $contentId
                    }) {
                      item {
                        id
                      }
                    }
                  }
                `;
                
                const result = await github.graphql(mutation, {
                  projectId: projectInfo.id,
                  contentId: issue.node_id
                });
                
                projectItemId = result.addProjectV2ItemByContentId.item.id;
                console.log(`✅ Added issue #${issue.number} to project`);
                
                return projectItemId;
                
              } catch (error) {
                console.error(`❌ Error ensuring issue in project: ${error.message}`);
                return null;
              }
            }
            
            // Main logic
            if (action === 'labeled') {
              console.log(`🏷️ Working label added to issue #${issue.number} - moving to appropriate In Progress status`);
              
              // Get current issue labels to determine issue type
              const currentLabels = issue.labels.map(label => label.name.toLowerCase());
              
              // Determine appropriate In Progress status based on issue type
              let inProgressStatus = CONFIG.STATUS_VALUES.ISSUE_IN_PROGRESS; // Default
              let issueType = "issue";
              
              if (currentLabels.includes('feature-request') || currentLabels.includes('enhancement')) {
                inProgressStatus = CONFIG.STATUS_VALUES.FEATURE_IN_PROGRESS;
                issueType = "feature request";
              } else if (currentLabels.includes('documentation')) {
                inProgressStatus = CONFIG.STATUS_VALUES.DOCUMENTATION_IN_PROGRESS;
                issueType = "documentation request";
              } else if (currentLabels.includes('question')) {
                inProgressStatus = CONFIG.STATUS_VALUES.GENERAL_IN_PROGRESS;
                issueType = "general question";
              } else if (currentLabels.includes('bug')) {
                inProgressStatus = CONFIG.STATUS_VALUES.ISSUE_IN_PROGRESS;
                issueType = "bug report";
              }
              
              // Ensure issue is in project and get project item ID
              const projectItemId = await ensureIssueInProject();
              
              if (projectItemId) {
                // Update status to appropriate In Progress status
                const success = await updateProjectStatus(projectItemId, inProgressStatus);
                
                if (success) {
                  // Add a comment to document the status change
                  try {
                    await github.rest.issues.createComment({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: issue.number,
                      body: `🚀 **Work Started**: This ${issueType} is now being actively worked on and has been moved to "${inProgressStatus}".\n\n**What happens next?**\n- We'll keep you updated on our progress\n- Feel free to ask questions or provide additional context\n- This issue will be updated when work is completed\n\nThank you for your patience!`
                    });
                    
                    console.log(`✅ Added work started comment to issue #${issue.number}`);
                  } catch (error) {
                    console.error(`❌ Error adding comment: ${error.message}`);
                  }
                }
              }
              
            } else if (action === 'unlabeled') {
              console.log(`🏷️ Working label removed from issue #${issue.number}`);
              
              // Get current issue labels to determine appropriate status
              const currentLabels = issue.labels.map(label => label.name.toLowerCase());
              
              // Determine appropriate status based on remaining labels
              let newStatus = CONFIG.STATUS_VALUES.BACKLOG; // Default fallback
              
              // PRIORITY: Check for bug label first (bugs should go to triage)
              if (currentLabels.includes('bug')) {
                newStatus = CONFIG.STATUS_VALUES.TO_TRIAGE;
                console.log(`🐛 Bug label detected - routing to triage (priority override)`);
              } else if (currentLabels.includes('feature-request') || currentLabels.includes('enhancement')) {
                newStatus = CONFIG.STATUS_VALUES.BACKLOG;
                console.log(`✨ Feature label detected - routing to backlog`);
              } else if (currentLabels.includes('documentation')) {
                newStatus = CONFIG.STATUS_VALUES.DOCUMENTATION_REQUEST;
                console.log(`📚 Documentation label detected - routing to docs queue`);
              } else if (currentLabels.includes('question')) {
                newStatus = CONFIG.STATUS_VALUES.GENERAL_QUESTION;
                console.log(`❓ Question label detected - routing to Q&A queue`);
              }
              
              // Get project item ID
              const projectItemId = await getProjectItemId(issue.number);
              
              if (projectItemId) {
                const success = await updateProjectStatus(projectItemId, newStatus);
                
                if (success) {
                  // Add a comment to document the status change
                  try {
                    await github.rest.issues.createComment({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: issue.number,
                      body: `📋 **Status Update**: Working label removed - issue moved to "${newStatus}".`
                    });
                    
                    console.log(`✅ Added status update comment to issue #${issue.number}`);
                  } catch (error) {
                    console.error(`❌ Error adding comment: ${error.message}`);
                  }
                }
              } else {
                console.log(`ℹ️ Issue #${issue.number} not found in project - no status update needed`);
              }
            }
            
            console.log(`✅ Working label processing complete for issue #${issue.number}`);
