name: Forward Issues To Main Repository

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]
  schedule:
    - cron: "17 * * * *"
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      pull_request_number:
        description: "Optional: process only this pull request number"
        required: false
        type: string
      close_source_issues:
        description: "Close source issues after mirroring"
        required: false
        default: true
        type: boolean
      close_source_pull_requests:
        description: "Close source pull requests after mirroring"
        required: false
        default: true
        type: boolean
      enforce_transfer_status_gate:
        description: "Only forward when source project field matches required_transfer_status"
        required: false
        default: false
        type: boolean
      required_transfer_status:
        description: "Expected value of the source project field before forwarding"
        required: false
        default: "Yes"
        type: string
      run_sync:
        description: "Run mirror sync logic instead of forwarding"
        required: false
        default: false
        type: boolean
      sync_recent_minutes:
        description: "Manual sync window (minutes) when run_sync is true"
        required: false
        default: "240"
        type: string

permissions:
  issues: write
  pull-requests: write
  repository-projects: write
  contents: read

jobs:
  forward-issue:
    if: |
      github.event_name == 'issues' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_sync != 'true')
    runs-on: ubuntu-latest

    steps:
      - name: Mirror issue and pull request activity to main repository
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GH_PROJECT_TOKEN }}
          script: |
            const SOURCE_OWNER = context.repo.owner;
            const SOURCE_REPO = context.repo.repo;

            // Change this if your canonical repository ever changes.
            const TARGET_OWNER = "braydenanderson2014";
            const TARGET_REPO = "C-Arduino-Libraries";
            const TARGET_PROJECTS = ["braydenanderson2014/4"];
            const MIRRORED_ISSUE_LABELS = ["bug"];
            const MIRROR_SOURCE_MARKER_PREFIX = "mirror-source:";
            const MIRROR_TARGET_MARKER_PREFIX = "mirror-target:";
            const TRANSFER_FIELD_NAME = "Needs Transfer";
            const TRANSFER_STATUS_PENDING = "Yes";
            const TRANSFER_STATUS_COMPLETE = "Completed Transfer";
            const PROJECT_STATUS_FIELD_NAME = "Status";
            const PROJECT_STATUS_TRIAGE = "Triage";
            const parseBool = (value, fallback) => {
              const normalized = String(value ?? "").trim().toLowerCase();
              if (!normalized) return fallback;
              if (["true", "1", "yes", "y", "on"].includes(normalized)) return true;
              if (["false", "0", "no", "n", "off"].includes(normalized)) return false;
              return fallback;
            };

            const CLOSE_SOURCE_ISSUE = parseBool(core.getInput("close_source_issues"), true);
            const CLOSE_SOURCE_PULL_REQUEST = parseBool(core.getInput("close_source_pull_requests"), true);
            const ENFORCE_TRANSFER_STATUS_GATE = parseBool(core.getInput("enforce_transfer_status_gate"), false);
            const REQUIRED_TRANSFER_STATUS = (core.getInput("required_transfer_status") || TRANSFER_STATUS_PENDING).trim() || TRANSFER_STATUS_PENDING;
            const projectCache = new Map();

            const getProjectNode = async (owner, projectNumber) => {
              const userQuery = `
                query($owner: String!, $number: Int!) {
                  user(login: $owner) {
                    projectV2(number: $number) {
                      id
                      fields(first: 100) {
                        nodes {
                          ... on ProjectV2FieldCommon {
                            id
                            name
                          }
                          ... on ProjectV2SingleSelectField {
                            id
                            name
                            options {
                              id
                              name
                            }
                          }
                        }
                      }
                    }
                  }
                }
              `;

              try {
                const userResponse = await github.graphql(userQuery, {
                  owner,
                  number: projectNumber
                });

                if (userResponse.user?.projectV2) {
                  return userResponse.user.projectV2;
                }
              } catch (error) {
                core.info(`User project lookup failed for ${owner}/${projectNumber}: ${error.message}`);
              }

              const orgQuery = `
                query($owner: String!, $number: Int!) {
                  organization(login: $owner) {
                    projectV2(number: $number) {
                      id
                      fields(first: 100) {
                        nodes {
                          ... on ProjectV2FieldCommon {
                            id
                            name
                          }
                          ... on ProjectV2SingleSelectField {
                            id
                            name
                            options {
                              id
                              name
                            }
                          }
                        }
                      }
                    }
                  }
                }
              `;

              try {
                const orgResponse = await github.graphql(orgQuery, {
                  owner,
                  number: projectNumber
                });

                if (orgResponse.organization?.projectV2) {
                  return orgResponse.organization.projectV2;
                }
              } catch (error) {
                core.info(`Organization project lookup failed for ${owner}/${projectNumber}: ${error.message}`);
              }

              return null;
            };

            const setProjectSingleSelectField = async (projectId, itemId, fields, fieldName, value) => {
              const targetField = (fields || []).find((f) => f && f.name === fieldName);
              if (!targetField) {
                core.warning(`Project field '${fieldName}' was not found.`);
                return;
              }

              const options = targetField.options || [];
              if (options.length > 0) {
                const option = options.find((o) => o.name && o.name.toLowerCase() === value.toLowerCase());
                if (!option) {
                  core.warning(`Could not find option '${value}' in field '${fieldName}'.`);
                  return;
                }

                await github.graphql(
                  `
                  mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                    updateProjectV2ItemFieldValue(
                      input: {
                        projectId: $projectId
                        itemId: $itemId
                        fieldId: $fieldId
                        value: { singleSelectOptionId: $optionId }
                      }
                    ) {
                      projectV2Item {
                        id
                      }
                    }
                  }
                  `,
                  {
                    projectId,
                    itemId,
                    fieldId: targetField.id,
                    optionId: option.id
                  }
                );

                return;
              }

              core.warning(
                `Field '${fieldName}' is not a single-select field. Add matching options or update workflow logic.`
              );
            };

            const setProjectTransferStatus = async (projectId, itemId, fields, value) => {
              await setProjectSingleSelectField(projectId, itemId, fields, TRANSFER_FIELD_NAME, value);
            };

            const getResolvedProject = async (projectRef) => {
              if (projectCache.has(projectRef)) {
                return projectCache.get(projectRef);
              }

              const [projectOwner, projectNumberText] = projectRef.split("/");
              const projectNumber = Number.parseInt(projectNumberText, 10);

              if (!projectOwner || Number.isNaN(projectNumber)) {
                core.warning(`Skipping invalid project reference: ${projectRef}`);
                projectCache.set(projectRef, null);
                return null;
              }

              const project = await getProjectNode(projectOwner, projectNumber);
              if (!project) {
                core.warning(`Could not resolve project: ${projectRef}`);
                projectCache.set(projectRef, null);
                return null;
              }

              projectCache.set(projectRef, project);
              return project;
            };

            const getSourceTransferStatusForProject = async (projectId, sourceNodeId) => {
              if (!sourceNodeId) {
                return null;
              }

              let cursor = null;
              while (true) {
                const response = await github.graphql(
                  `
                  query($projectId: ID!, $cursor: String, $fieldName: String!) {
                    node(id: $projectId) {
                      ... on ProjectV2 {
                        items(first: 100, after: $cursor) {
                          nodes {
                            content {
                              ... on Issue { id }
                              ... on PullRequest { id }
                            }
                            fieldValueByName(name: $fieldName) {
                              ... on ProjectV2ItemFieldSingleSelectValue {
                                name
                              }
                              ... on ProjectV2ItemFieldTextValue {
                                text
                              }
                            }
                          }
                          pageInfo {
                            hasNextPage
                            endCursor
                          }
                        }
                      }
                    }
                  }
                  `,
                  {
                    projectId,
                    cursor,
                    fieldName: TRANSFER_FIELD_NAME
                  }
                );

                const items = response.node?.items?.nodes || [];
                const match = items.find((n) => n?.content?.id === sourceNodeId);
                if (match) {
                  return match.fieldValueByName?.name || match.fieldValueByName?.text || null;
                }

                const pageInfo = response.node?.items?.pageInfo;
                if (!pageInfo?.hasNextPage) {
                  break;
                }

                cursor = pageInfo.endCursor;
              }

              return null;
            };

            const isIssueEvent = context.eventName === "issues";
            const isPullRequestEvent = context.eventName === "pull_request";
            const isManualDispatch = context.eventName === "workflow_dispatch";

            // Safety: do nothing if this workflow is installed in the target repo.
            if (SOURCE_OWNER === TARGET_OWNER && SOURCE_REPO === TARGET_REPO) {
              core.info("This is the main repository. Skipping forward operation.");
              return;
            }

            if (!isIssueEvent && !isPullRequestEvent && !isManualDispatch) {
              core.info(`Unsupported event '${context.eventName}'. Skipping.`);
              return;
            }

            const workItems = [];

            if (isIssueEvent) {
              const issue = context.payload.issue;
              // Guard against converted edge cases on issue events.
              if (issue?.pull_request) {
                core.info("Issue payload references a pull request. Skipping issue-flow forwarding.");
                return;
              }

              workItems.push({
                sourceTypeLabel: "issue",
                isIssueFlow: true,
                isPullRequestFlow: false,
                sourceNumber: issue.number,
                sourceNodeId: issue.node_id,
                sourceTitle: issue.title,
                sourceBody: issue.body,
                sourceUrl: issue.html_url,
                sourceUser: issue.user?.login,
                sourceLabels: (issue.labels || []).map((l) => l.name).filter(Boolean),
                sourceContextLines: [
                  `Original issue: ${issue.html_url}`,
                  `Opened by: @${issue.user?.login || "unknown"}`
                ]
              });
            }

            if (isPullRequestEvent) {
              const pullRequest = context.payload.pull_request;
              workItems.push({
                sourceTypeLabel: "pull request",
                isIssueFlow: false,
                isPullRequestFlow: true,
                sourceNumber: pullRequest.number,
                sourceNodeId: pullRequest.node_id,
                sourceTitle: pullRequest.title,
                sourceBody: pullRequest.body,
                sourceUrl: pullRequest.html_url,
                sourceUser: pullRequest.user?.login,
                sourceLabels: (pullRequest.labels || []).map((l) => l.name).filter(Boolean),
                sourceContextLines: [
                  `Original pull request: ${pullRequest.html_url}`,
                  `Opened by: @${pullRequest.user?.login || "unknown"}`,
                  `Base branch: ${pullRequest.base?.ref || "unknown"}`,
                  `Head branch: ${pullRequest.head?.label || "unknown"}`,
                  `Draft: ${pullRequest.draft ? "yes" : "no"}`
                ]
              });
            }

            if (isManualDispatch) {
              const requestedPrNumberRaw = (core.getInput("pull_request_number") || "").trim();
              if (requestedPrNumberRaw) {
                const requestedPrNumber = Number.parseInt(requestedPrNumberRaw, 10);
                if (Number.isNaN(requestedPrNumber)) {
                  core.setFailed(`Invalid pull_request_number input: '${requestedPrNumberRaw}'`);
                  return;
                }

                const prResponse = await github.rest.pulls.get({
                  owner: SOURCE_OWNER,
                  repo: SOURCE_REPO,
                  pull_number: requestedPrNumber
                });

                const pullRequest = prResponse.data;
                if (pullRequest.state !== "open") {
                  core.info(`Pull request #${requestedPrNumber} is not open (state=${pullRequest.state}). Skipping.`);
                  return;
                }

                workItems.push({
                  sourceTypeLabel: "pull request",
                  isIssueFlow: false,
                  isPullRequestFlow: true,
                  sourceNumber: pullRequest.number,
                  sourceNodeId: pullRequest.node_id,
                  sourceTitle: pullRequest.title,
                  sourceBody: pullRequest.body,
                  sourceUrl: pullRequest.html_url,
                  sourceUser: pullRequest.user?.login,
                  sourceLabels: (pullRequest.labels || []).map((l) => l.name).filter(Boolean),
                  sourceContextLines: [
                    `Original pull request: ${pullRequest.html_url}`,
                    `Opened by: @${pullRequest.user?.login || "unknown"}`,
                    `Base branch: ${pullRequest.base?.ref || "unknown"}`,
                    `Head branch: ${pullRequest.head?.label || "unknown"}`,
                    `Draft: ${pullRequest.draft ? "yes" : "no"}`
                  ]
                });
              } else {
                const openPullRequests = await github.paginate(github.rest.pulls.list, {
                  owner: SOURCE_OWNER,
                  repo: SOURCE_REPO,
                  state: "open",
                  per_page: 100
                });

                for (const pullRequest of openPullRequests) {
                  workItems.push({
                    sourceTypeLabel: "pull request",
                    isIssueFlow: false,
                    isPullRequestFlow: true,
                    sourceNumber: pullRequest.number,
                    sourceNodeId: pullRequest.node_id,
                    sourceTitle: pullRequest.title,
                    sourceBody: pullRequest.body,
                    sourceUrl: pullRequest.html_url,
                    sourceUser: pullRequest.user?.login,
                    sourceLabels: (pullRequest.labels || []).map((l) => l.name).filter(Boolean),
                    sourceContextLines: [
                      `Original pull request: ${pullRequest.html_url}`,
                      `Opened by: @${pullRequest.user?.login || "unknown"}`,
                      `Base branch: ${pullRequest.base?.ref || "unknown"}`,
                      `Head branch: ${pullRequest.head?.label || "unknown"}`,
                      `Draft: ${pullRequest.draft ? "yes" : "no"}`
                    ]
                  });
                }
              }
            }

            if (workItems.length === 0) {
              core.info("No eligible items to process.");
              return;
            }

            core.info(`Processing ${workItems.length} item(s).`);

            for (const item of workItems) {
              const trackedProjectItems = [];
              const labelsText = item.sourceLabels.length ? item.sourceLabels.map((l) => `- ${l}`).join("\n") : "- (none)";
              const sourceIssueRef = `${SOURCE_OWNER}/${SOURCE_REPO}#${item.sourceNumber}`;
              const sourceType = item.isPullRequestFlow ? "pull_request" : "issue";
              const sourceMarker = `<!-- ${MIRROR_SOURCE_MARKER_PREFIX} ${sourceIssueRef};type=${sourceType} -->`;
              const sourceNeedle = `${MIRROR_SOURCE_MARKER_PREFIX} ${sourceIssueRef}`;

              if (ENFORCE_TRANSFER_STATUS_GATE) {
                let gatePassed = false;

                for (const projectRef of TARGET_PROJECTS) {
                  const project = await getResolvedProject(projectRef);
                  if (!project) {
                    continue;
                  }

                  const currentStatus = await getSourceTransferStatusForProject(project.id, item.sourceNodeId);
                  if (!currentStatus) {
                    continue;
                  }

                  if (currentStatus.toLowerCase() === REQUIRED_TRANSFER_STATUS.toLowerCase()) {
                    gatePassed = true;
                    break;
                  }
                }

                if (!gatePassed) {
                  core.info(
                    `Skipping ${sourceIssueRef}: '${TRANSFER_FIELD_NAME}' did not match required value '${REQUIRED_TRANSFER_STATUS}'.`
                  );
                  continue;
                }
              }

              const mirroredTitle = item.isPullRequestFlow
                ? `[${SOURCE_REPO} PR] ${item.sourceTitle}`
                : `[${SOURCE_REPO}] ${item.sourceTitle}`;

              const existingMirror = await github.rest.search.issuesAndPullRequests({
                q: `repo:${TARGET_OWNER}/${TARGET_REPO} is:issue in:body \"${sourceNeedle}\"`,
                per_page: 1
              });

              if ((existingMirror.data.items || []).length > 0) {
                const existingIssue = existingMirror.data.items[0];
                core.info(`Mirror already exists for ${sourceIssueRef}: ${existingIssue.html_url}`);
                await github.rest.issues.createComment({
                  owner: SOURCE_OWNER,
                  repo: SOURCE_REPO,
                  issue_number: item.sourceNumber,
                  body: [
                    "A mirrored tracker item already exists in the main repository.",
                    `Mirror: ${existingIssue.html_url}`,
                    `<!-- ${MIRROR_TARGET_MARKER_PREFIX} ${TARGET_OWNER}/${TARGET_REPO}#${existingIssue.number};type=${sourceType} -->`
                  ].join("\n")
                });
                continue;
              }

              const mirroredBody = [
                `This issue was forwarded from a ${item.sourceTypeLabel}: ${sourceIssueRef}.`,
                sourceMarker,
                "",
                ...item.sourceContextLines,
                "",
                "### Source labels",
                labelsText,
                "",
                "---",
                "",
                "### Original content",
                item.sourceBody && item.sourceBody.trim() ? item.sourceBody : "(No body provided.)"
              ].join("\n");

              const created = await github.rest.issues.create({
                owner: TARGET_OWNER,
                repo: TARGET_REPO,
                title: mirroredTitle,
                body: mirroredBody
              });

              const targetIssueNumber = created.data.number;
              const targetIssueUrl = created.data.html_url;
              const targetIssueNodeId = created.data.node_id;

              if (MIRRORED_ISSUE_LABELS.length > 0) {
                try {
                  await github.rest.issues.addLabels({
                    owner: TARGET_OWNER,
                    repo: TARGET_REPO,
                    issue_number: targetIssueNumber,
                    labels: MIRRORED_ISSUE_LABELS
                  });
                } catch (error) {
                  core.warning(`Could not apply labels '${MIRRORED_ISSUE_LABELS.join(", ")}' to mirrored issue #${targetIssueNumber}: ${error.message}`);
                }
              }

              for (const projectRef of TARGET_PROJECTS) {
                const project = await getResolvedProject(projectRef);
                if (!project) {
                  continue;
                }

                const addResult = await github.graphql(
                  `
                  mutation($projectId: ID!, $contentId: ID!) {
                    addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                      item {
                        id
                      }
                    }
                  }
                  `,
                  {
                    projectId: project.id,
                    contentId: targetIssueNodeId
                  }
                );

                const itemId = addResult.addProjectV2ItemById?.item?.id;
                if (!itemId) {
                  core.warning(`Issue was created but could not be added to project: ${projectRef}`);
                  continue;
                }

                await setProjectTransferStatus(project.id, itemId, project.fields?.nodes || [], TRANSFER_STATUS_PENDING);
                await setProjectSingleSelectField(
                  project.id,
                  itemId,
                  project.fields?.nodes || [],
                  PROJECT_STATUS_FIELD_NAME,
                  PROJECT_STATUS_TRIAGE
                );
                trackedProjectItems.push({
                  projectId: project.id,
                  itemId,
                  fields: project.fields?.nodes || []
                });
              }

              await github.rest.issues.createComment({
                owner: TARGET_OWNER,
                repo: TARGET_REPO,
                issue_number: targetIssueNumber,
                body: [
                  `Backlink: mirrored from ${sourceIssueRef}.`,
                  `Original URL: ${item.sourceUrl}`,
                  sourceMarker
                ].join("\n")
              });

              await github.rest.issues.createComment({
                owner: SOURCE_OWNER,
                repo: SOURCE_REPO,
                issue_number: item.sourceNumber,
                body: [
                  item.isPullRequestFlow ? "Thanks for opening this pull request." : "Thanks for opening this issue.",
                  "",
                  `This repository forwards issues to our main tracker: ${TARGET_OWNER}/${TARGET_REPO}.`,
                  `Your ${item.sourceTypeLabel} has been mirrored to: ${targetIssueUrl}`,
                  "",
                  "Please continue discussion on the mirrored issue so maintainers can track everything in one place.",
                  item.isPullRequestFlow ? "If code changes are still needed, please open the pull request against the main repository after discussion." : "",
                  `<!-- ${MIRROR_TARGET_MARKER_PREFIX} ${TARGET_OWNER}/${TARGET_REPO}#${targetIssueNumber};type=${sourceType} -->`
                ].filter(Boolean).join("\n")
              });

              if (item.isIssueFlow && CLOSE_SOURCE_ISSUE) {
                await github.rest.issues.update({
                  owner: SOURCE_OWNER,
                  repo: SOURCE_REPO,
                  issue_number: item.sourceNumber,
                  state: "closed",
                  state_reason: "completed"
                });
              }

              if (item.isPullRequestFlow && CLOSE_SOURCE_PULL_REQUEST) {
                await github.rest.pulls.update({
                  owner: SOURCE_OWNER,
                  repo: SOURCE_REPO,
                  pull_number: item.sourceNumber,
                  state: "closed"
                });
              }

              for (const tracked of trackedProjectItems) {
                await setProjectTransferStatus(
                  tracked.projectId,
                  tracked.itemId,
                  tracked.fields,
                  TRANSFER_STATUS_COMPLETE
                );
              }

              core.info(`Forwarded ${item.sourceTypeLabel} ${sourceIssueRef} to ${TARGET_OWNER}/${TARGET_REPO}#${targetIssueNumber}`);
            }

  sync-mirrors:
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_sync == 'true')
    runs-on: ubuntu-latest

    steps:
      - name: Sync mirrored issue status and PR commit digests
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GH_PROJECT_TOKEN }}
          script: |
            const SOURCE_OWNER = context.repo.owner;
            const SOURCE_REPO = context.repo.repo;

            const TARGET_OWNER = "braydenanderson2014";
            const TARGET_REPO = "C-Arduino-Libraries";
            const MIRROR_SOURCE_MARKER_REGEX = /<!--\s*mirror-source:\s*([^/]+)\/([^#]+)#(\d+)(?:;type=([a-z_]+))?\s*-->/i;
            const SYNC_MARKER_PREFIX = "<!-- mirror-sync:";
            const COMMIT_DIGEST_MARKER_PREFIX = "<!-- mirror-commit-digest:";
            const FAST_SCHEDULE = "*/10 * * * *";

            if (SOURCE_OWNER === TARGET_OWNER && SOURCE_REPO === TARGET_REPO) {
              core.info("This is the main repository. Skipping mirror sync.");
              return;
            }

            const toIsoMinutesAgo = (minutes) => new Date(Date.now() - minutes * 60 * 1000).toISOString();
            const parseSourceMarker = (body) => {
              if (!body) return null;
              const match = body.match(MIRROR_SOURCE_MARKER_REGEX);
              if (!match) return null;
              return {
                owner: match[1],
                repo: match[2],
                number: Number.parseInt(match[3], 10),
                sourceType: match[4] || "issue"
              };
            };

            const listTargetIssuesSince = async (sinceIso) => {
              const all = await github.paginate(github.rest.issues.listForRepo, {
                owner: TARGET_OWNER,
                repo: TARGET_REPO,
                state: "all",
                sort: "updated",
                direction: "desc",
                since: sinceIso,
                per_page: 100
              });

              return all.filter((i) => !i.pull_request);
            };

            const upsertCommentWithMarker = async ({ owner, repo, issueNumber, markerNeedle, body }) => {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: issueNumber,
                per_page: 100
              });

              const existing = comments.find((c) => typeof c.body === "string" && c.body.includes(markerNeedle));

              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body
                });
                return existing.body || "";
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body
              });
              return "";
            };

            const formatCommitDigest = ({ sourceRef, sourcePrUrl, headSha, commits, files }) => {
              const commitRows = commits.slice(0, 20).map((c) => {
                const sha = (c.sha || "").slice(0, 7);
                const msg = (c.commit?.message || "").split("\n")[0] || "(no message)";
                const author = c.author?.login || c.commit?.author?.name || "unknown";
                return `- ${sha} ${msg} (@${author})`;
              });

              const fileRows = files.slice(0, 40).map((f) => {
                const status = (f.status || "modified").toUpperCase();
                const additions = Number(f.additions || 0);
                const deletions = Number(f.deletions || 0);
                return `- ${status} ${f.filename} (+${additions}/-${deletions})`;
              });

              return [
                "### Source PR Commit/File Sync",
                `Source PR: ${sourcePrUrl}`,
                `Source ref: ${sourceRef}`,
                `Head SHA: ${headSha}`,
                `Total commits: ${commits.length}`,
                `Files changed: ${files.length}`,
                "",
                "#### Recent commits",
                commitRows.length > 0 ? commitRows.join("\n") : "- (none)",
                "",
                "#### Changed files",
                fileRows.length > 0 ? fileRows.join("\n") : "- (none)"
              ].join("\n");
            };

            const currentSchedule = context.eventName === "schedule" ? (context.payload.schedule || "") : "";
            const manualMinutesInput = String(core.getInput("sync_recent_minutes") || "").trim();
            let syncWindowMinutes = 65;

            if (context.eventName === "workflow_dispatch" && manualMinutesInput) {
              const parsed = Number.parseInt(manualMinutesInput, 10);
              if (!Number.isNaN(parsed) && parsed > 0) {
                syncWindowMinutes = parsed;
              }
            }

            if (context.eventName === "schedule" && currentSchedule === FAST_SCHEDULE) {
              const burstCheckSince = toIsoMinutesAgo(90);
              const burstCandidates = await listTargetIssuesSince(burstCheckSince);
              const burstForSourceRepo = burstCandidates.filter((targetIssue) => {
                const marker = parseSourceMarker(targetIssue.body || "");
                return marker && marker.owner === SOURCE_OWNER && marker.repo === SOURCE_REPO;
              });

              if (burstForSourceRepo.length === 0) {
                core.info("Fast sync skipped: no mirrored target activity in the last 90 minutes.");
                return;
              }

              syncWindowMinutes = 20;
              core.info(`Fast sync enabled for active burst (${burstForSourceRepo.length} recent mirror updates).`);
            }

            const sinceIso = toIsoMinutesAgo(syncWindowMinutes);
            const targetIssues = await listTargetIssuesSince(sinceIso);

            const mirrors = targetIssues
              .map((targetIssue) => ({ targetIssue, marker: parseSourceMarker(targetIssue.body || "") }))
              .filter((x) => x.marker && x.marker.owner === SOURCE_OWNER && x.marker.repo === SOURCE_REPO && Number.isInteger(x.marker.number));

            if (mirrors.length === 0) {
              core.info(`No mirrored target issues updated in the last ${syncWindowMinutes} minute(s).`);
              return;
            }

            core.info(`Syncing ${mirrors.length} mirrored item(s) updated since ${sinceIso}.`);

            let closureChanges = 0;
            let reopenChanges = 0;
            let digestChanges = 0;

            for (const { targetIssue, marker } of mirrors) {
              const sourceNumber = marker.number;
              const sourceType = marker.sourceType || "issue";
              const targetRef = `${TARGET_OWNER}/${TARGET_REPO}#${targetIssue.number}`;
              const sourceRef = `${SOURCE_OWNER}/${SOURCE_REPO}#${sourceNumber}`;

              let sourceIssue;
              try {
                const issueResponse = await github.rest.issues.get({
                  owner: SOURCE_OWNER,
                  repo: SOURCE_REPO,
                  issue_number: sourceNumber
                });
                sourceIssue = issueResponse.data;
              } catch (error) {
                core.warning(`Skipping ${targetRef}: source issue ${sourceRef} was not found (${error.message}).`);
                continue;
              }

              const syncMarkerNeedle = `${SYNC_MARKER_PREFIX} target=${targetRef};`;
              const syncSummaryBody = [
                `Mirror sync status for ${targetRef}.`,
                `Target state: ${targetIssue.state}`,
                `Target last update: ${targetIssue.updated_at}`,
                `Last sync run: ${new Date().toISOString()}`,
                `${SYNC_MARKER_PREFIX} target=${targetRef};state=${targetIssue.state};updated=${targetIssue.updated_at};sourceType=${sourceType} -->`
              ].join("\n");

              await upsertCommentWithMarker({
                owner: SOURCE_OWNER,
                repo: SOURCE_REPO,
                issueNumber: sourceNumber,
                markerNeedle: syncMarkerNeedle,
                body: syncSummaryBody
              });

              if (targetIssue.state === "closed" && sourceIssue.state === "open") {
                if (sourceType === "pull_request" && sourceIssue.pull_request) {
                  await github.rest.pulls.update({
                    owner: SOURCE_OWNER,
                    repo: SOURCE_REPO,
                    pull_number: sourceNumber,
                    state: "closed"
                  });
                } else {
                  await github.rest.issues.update({
                    owner: SOURCE_OWNER,
                    repo: SOURCE_REPO,
                    issue_number: sourceNumber,
                    state: "closed",
                    state_reason: "completed"
                  });
                }

                await github.rest.issues.createComment({
                  owner: SOURCE_OWNER,
                  repo: SOURCE_REPO,
                  issue_number: sourceNumber,
                  body: [
                    `Mirror update: ${targetRef} was closed, so this source ${sourceType === "pull_request" ? "pull request" : "issue"} was closed to match.`,
                    `Target URL: ${targetIssue.html_url}`
                  ].join("\n")
                });
                closureChanges += 1;
              }

              if (targetIssue.state === "open" && sourceIssue.state === "closed") {
                if (sourceType === "pull_request" && sourceIssue.pull_request) {
                  await github.rest.pulls.update({
                    owner: SOURCE_OWNER,
                    repo: SOURCE_REPO,
                    pull_number: sourceNumber,
                    state: "open"
                  });
                } else {
                  await github.rest.issues.update({
                    owner: SOURCE_OWNER,
                    repo: SOURCE_REPO,
                    issue_number: sourceNumber,
                    state: "open"
                  });
                }

                await github.rest.issues.createComment({
                  owner: SOURCE_OWNER,
                  repo: SOURCE_REPO,
                  issue_number: sourceNumber,
                  body: [
                    `Mirror update: ${targetRef} was reopened, so this source ${sourceType === "pull_request" ? "pull request" : "issue"} was reopened to match.`,
                    `Target URL: ${targetIssue.html_url}`
                  ].join("\n")
                });
                reopenChanges += 1;
              }

              if (sourceType === "pull_request") {
                try {
                  const pr = await github.rest.pulls.get({
                    owner: SOURCE_OWNER,
                    repo: SOURCE_REPO,
                    pull_number: sourceNumber
                  });

                  const commits = await github.paginate(github.rest.pulls.listCommits, {
                    owner: SOURCE_OWNER,
                    repo: SOURCE_REPO,
                    pull_number: sourceNumber,
                    per_page: 100
                  });

                  const files = await github.paginate(github.rest.pulls.listFiles, {
                    owner: SOURCE_OWNER,
                    repo: SOURCE_REPO,
                    pull_number: sourceNumber,
                    per_page: 100
                  });

                  const headSha = pr.data.head?.sha || "";
                  const digestMarkerNeedle = `${COMMIT_DIGEST_MARKER_PREFIX} source=${sourceRef};`;

                  const digestBody = [
                    formatCommitDigest({
                      sourceRef,
                      sourcePrUrl: pr.data.html_url,
                      headSha,
                      commits,
                      files
                    }),
                    "",
                    `${COMMIT_DIGEST_MARKER_PREFIX} source=${sourceRef};head=${headSha};updated=${new Date().toISOString()} -->`
                  ].join("\n");

                  const existingDigestBody = await upsertCommentWithMarker({
                    owner: TARGET_OWNER,
                    repo: TARGET_REPO,
                    issueNumber: targetIssue.number,
                    markerNeedle: digestMarkerNeedle,
                    body: digestBody
                  });

                  const previousHeadMatch = (existingDigestBody || "").match(/head=([0-9a-f]{7,40})/i);
                  const previousHead = previousHeadMatch ? previousHeadMatch[1] : "";
                  if (headSha && previousHead !== headSha) {
                    digestChanges += 1;

                    await github.rest.issues.createComment({
                      owner: SOURCE_OWNER,
                      repo: SOURCE_REPO,
                      issue_number: sourceNumber,
                      body: [
                        `Mirror update: commit/file digest was refreshed on ${targetRef}.`,
                        `Target URL: ${targetIssue.html_url}`,
                        `New head SHA: ${headSha}`
                      ].join("\n")
                    });
                  }
                } catch (error) {
                  core.warning(`Commit digest sync skipped for ${sourceRef}: ${error.message}`);
                }
              }
            }

            core.info(
              `Mirror sync finished. items=${mirrors.length}, closed=${closureChanges}, reopened=${reopenChanges}, commitDigestUpdated=${digestChanges}`
            );
