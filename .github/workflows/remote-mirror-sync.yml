name: Remote Mirror Sync

on:
  schedule:
    - cron: "17 * * * *"
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      sync_recent_minutes:
        description: "Optional override for the sync window in minutes"
        required: false
        type: string

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  sync-mirror-followups:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync mirrored issue state and PR digests
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GH_PROJECT_TOKEN }}
          script: |
            const fs = require("fs");

            const configPath = ".github/remote-mirror-sync-config.json";
            const rawConfig = fs.readFileSync(configPath, "utf8");
            const config = JSON.parse(rawConfig);

            const SOURCE_OWNER = context.repo.owner;
            const SOURCE_REPO = context.repo.repo;
            const TARGET_OWNER = config.target?.owner;
            const TARGET_REPO = config.target?.repo;
            const IS_CANONICAL_REPO = SOURCE_OWNER === TARGET_OWNER && SOURCE_REPO === TARGET_REPO;

            if (!TARGET_OWNER || !TARGET_REPO) {
              core.setFailed(`Missing target.owner or target.repo in ${configPath}`);
              return;
            }

            if (IS_CANONICAL_REPO) {
              core.info("Running remote mirror sync in canonical repository mode (source-linked mirror discovery enabled).");
            }

            const MARKER_SOURCE = config.markers?.source || "mirror-source";
            const MARKER_TARGET = config.markers?.target || "mirror-target";
            const MARKER_SYNC = config.markers?.sync || "mirror-sync";
            const MARKER_ACTIVITY = config.markers?.activity || "mirror-activity";
            const MARKER_COMMIT_DIGEST = config.markers?.commitDigest || "mirror-commit-digest";
            const FAST_SCHEDULE = "*/10 * * * *";
            const trackedBaseBranches = Array.isArray(config.trackedSourceBaseBranches)
              ? config.trackedSourceBaseBranches.filter(Boolean)
              : [];

            const syncConfig = {
              defaultWindowMinutes: Number(config.sync?.defaultWindowMinutes || 65),
              burstWindowMinutes: Number(config.sync?.burstWindowMinutes || 20),
              burstLookbackMinutes: Number(config.sync?.burstLookbackMinutes || 90),
              discoveryScanMaxItems: Number(config.sync?.discoveryScanMaxItems || 400),
              maxTargetCommentsPerDigest: Number(config.sync?.maxTargetCommentsPerDigest || 6),
              maxCommentBodyCharacters: Number(config.sync?.maxCommentBodyCharacters || 500),
              maxCommitDigestEntries: Number(config.sync?.maxCommitDigestEntries || 20),
              maxFileDigestEntries: Number(config.sync?.maxFileDigestEntries || 40)
            };

            const toIsoMinutesAgo = (minutes) => new Date(Date.now() - minutes * 60 * 1000).toISOString();

            const escapeRegex = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            const sourceMarkerRegex = new RegExp(
              `<!--\\s*${escapeRegex(MARKER_SOURCE)}:\\s*([^/]+)\\/([^#]+)#(\\d+)(?:;type=([a-z_]+))?\\s*-->`,
              "i"
            );
            const targetMarkerRegex = new RegExp(
              `<!--\\s*${escapeRegex(MARKER_TARGET)}:\\s*([^/]+)\\/([^#]+)#(\\d+)(?:;type=([a-z_]+))?\\s*-->`,
              "i"
            );
            const mirroredIssueOrPullUrlRegex = /https?:\/\/github\.com\/([^/\s]+)\/([^/\s]+)\/(issues|pull)\/(\d+)/i;

            const parseMarker = (body, regex) => {
              if (!body) return null;
              const match = body.match(regex);
              if (!match) return null;
              return {
                owner: match[1],
                repo: match[2],
                number: Number.parseInt(match[3], 10),
                sourceType: match[4] || "issue"
              };
            };

            const parseMirrorTargetReference = (body) => {
              const marker = parseMarker(body, targetMarkerRegex);
              if (marker) {
                return marker;
              }

              const urlMatch = (body || "").match(mirroredIssueOrPullUrlRegex);
              if (!urlMatch) {
                return null;
              }

              return {
                owner: urlMatch[1],
                repo: urlMatch[2],
                sourceType: urlMatch[3] === "pull" ? "pull_request" : "issue",
                number: Number.parseInt(urlMatch[4], 10)
              };
            };

            const parseLastSeenCommentId = (body) => {
              const match = (body || "").match(/lastCommentId=(\d+)/i);
              return match ? Number.parseInt(match[1], 10) : 0;
            };

            const parseLastSeenEncodedLabels = (body) => {
              const match = (body || "").match(/targetLabels=([^;\s>]*)/i);
              return match ? String(match[1]) : "";
            };

            const decodeMarkerValue = (value) => {
              if (!value) return "";
              try {
                return decodeURIComponent(value);
              } catch {
                return "";
              }
            };

            const normalizeLabelName = (label) => {
              if (!label) return "";
              if (typeof label === "string") return label.trim();
              if (typeof label.name === "string") return label.name.trim();
              return "";
            };

            const getLabelNames = (issueLike) => {
              const labels = Array.isArray(issueLike?.labels) ? issueLike.labels : [];
              return labels
                .map(normalizeLabelName)
                .filter(Boolean)
                .sort((a, b) => a.localeCompare(b));
            };

            const trimCommentBody = (body) => {
              const normalized = String(body || "")
                .replace(/\r/g, "")
                .trim();
              if (!normalized) return "(No comment body provided.)";
              if (normalized.length <= syncConfig.maxCommentBodyCharacters) {
                return normalized;
              }
              return `${normalized.slice(0, syncConfig.maxCommentBodyCharacters)}...`;
            };

            const listTargetIssuesSince = async (sinceIso) => {
              return github.paginate(github.rest.issues.listForRepo, {
                owner: TARGET_OWNER,
                repo: TARGET_REPO,
                state: "all",
                sort: "updated",
                direction: "desc",
                since: sinceIso,
                per_page: 100
              });
            };

            const listSourceIssuesSince = async (sinceIso) => {
              return github.paginate(github.rest.issues.listForRepo, {
                owner: SOURCE_OWNER,
                repo: SOURCE_REPO,
                state: "all",
                sort: "updated",
                direction: "desc",
                since: sinceIso,
                per_page: 100
              });
            };

            const listSourceIssuesForDiscovery = async (sinceIso) => {
              const recent = await listSourceIssuesSince(sinceIso);

              const maxItems = Number.isFinite(syncConfig.discoveryScanMaxItems)
                ? Math.max(100, syncConfig.discoveryScanMaxItems)
                : 400;
              const maxPages = Math.max(1, Math.ceil(maxItems / 100));
              const expanded = [];

              for (let page = 1; page <= maxPages; page += 1) {
                const response = await github.rest.issues.listForRepo({
                  owner: SOURCE_OWNER,
                  repo: SOURCE_REPO,
                  state: "all",
                  sort: "updated",
                  direction: "desc",
                  per_page: 100,
                  page
                });

                const pageItems = Array.isArray(response.data) ? response.data : [];
                if (pageItems.length === 0) {
                  break;
                }

                expanded.push(...pageItems);
                if (pageItems.length < 100) {
                  break;
                }
              }

              // Fallback path: if issue listing unexpectedly returns nothing,
              // still discover mirrored links from open/closed PR numbers.
              if (expanded.length === 0 && recent.length === 0) {
                for (let page = 1; page <= maxPages; page += 1) {
                  const response = await github.rest.pulls.list({
                    owner: SOURCE_OWNER,
                    repo: SOURCE_REPO,
                    state: "all",
                    sort: "updated",
                    direction: "desc",
                    per_page: 100,
                    page
                  });

                  const pageItems = Array.isArray(response.data) ? response.data : [];
                  if (pageItems.length === 0) {
                    break;
                  }

                  expanded.push(
                    ...pageItems.map((pullRequest) => ({
                      number: pullRequest.number,
                      updated_at: pullRequest.updated_at,
                      state: pullRequest.state,
                      pull_request: {
                        url: pullRequest.url
                      }
                    }))
                  );

                  if (pageItems.length < 100) {
                    break;
                  }
                }
              }

              const uniqueByNumber = new Map();
              for (const item of expanded) {
                uniqueByNumber.set(item.number, item);
              }
              for (const item of recent) {
                uniqueByNumber.set(item.number, item);
              }

              core.info(
                `Source discovery candidates: recent=${recent.length}, expanded=${expanded.length}, unique=${uniqueByNumber.size}, maxItems=${maxItems}`
              );

              return Array.from(uniqueByNumber.values());
            };

            const upsertCommentWithMarker = async ({ owner, repo, issueNumber, markerNeedle, body }) => {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: issueNumber,
                per_page: 100
              });

              const existing = comments.find((comment) => typeof comment.body === "string" && comment.body.includes(markerNeedle));

              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body
                });
                return existing.body || "";
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body
              });
              return "";
            };

            const getSourceIssue = async (sourceNumber) => {
              const response = await github.rest.issues.get({
                owner: SOURCE_OWNER,
                repo: SOURCE_REPO,
                issue_number: sourceNumber
              });
              return response.data;
            };

            const listSourcePullRequestsSince = async (sinceIso) => {
              const allPullRequests = await github.paginate(github.rest.pulls.list, {
                owner: SOURCE_OWNER,
                repo: SOURCE_REPO,
                state: "all",
                sort: "updated",
                direction: "desc",
                per_page: 100
              });

              return allPullRequests.filter((pullRequest) => {
                if (!pullRequest.updated_at || pullRequest.updated_at < sinceIso) {
                  return false;
                }

                if (trackedBaseBranches.length === 0) {
                  return true;
                }

                return trackedBaseBranches.includes(pullRequest.base?.ref || "");
              });
            };

            const resolveMirrorTargetForSource = async (sourceNumber) => {
              const sourceIssue = await getSourceIssue(sourceNumber);
              const directMarker = parseMirrorTargetReference(sourceIssue.body || "");
              if (directMarker) {
                if (!directMarker.sourceType && sourceIssue.pull_request) {
                  directMarker.sourceType = "pull_request";
                }
                return directMarker;
              }

              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: SOURCE_OWNER,
                repo: SOURCE_REPO,
                issue_number: sourceNumber,
                per_page: 100
              });

              for (let index = comments.length - 1; index >= 0; index -= 1) {
                const comment = comments[index];
                const marker = parseMirrorTargetReference(comment.body || "");
                if (marker) {
                  if (!marker.sourceType && sourceIssue.pull_request) {
                    marker.sourceType = "pull_request";
                  }
                  return marker;
                }
              }

              return null;
            };

            const formatCommitDigest = ({ sourceRef, sourcePrUrl, headSha, commits, files }) => {
              const commitRows = commits.slice(0, syncConfig.maxCommitDigestEntries).map((commit) => {
                const sha = (commit.sha || "").slice(0, 7);
                const message = (commit.commit?.message || "").split("\n")[0] || "(no message)";
                const author = commit.author?.login || commit.commit?.author?.name || "unknown";
                return `- ${sha} ${message} (@${author})`;
              });

              const fileRows = files.slice(0, syncConfig.maxFileDigestEntries).map((file) => {
                const status = (file.status || "modified").toUpperCase();
                return `- ${status} ${file.filename} (+${Number(file.additions || 0)}/-${Number(file.deletions || 0)})`;
              });

              return [
                "### Source PR Commit/File Sync",
                `Source PR: ${sourcePrUrl}`,
                `Source ref: ${sourceRef}`,
                `Head SHA: ${headSha}`,
                `Total commits: ${commits.length}`,
                `Files changed: ${files.length}`,
                "",
                "#### Recent commits",
                commitRows.length > 0 ? commitRows.join("\n") : "- (none)",
                "",
                "#### Changed files",
                fileRows.length > 0 ? fileRows.join("\n") : "- (none)"
              ].join("\n");
            };

            const summarizeTargetComments = (comments, targetRef, targetUrl) => {
              const rows = comments.slice(0, syncConfig.maxTargetCommentsPerDigest).map((comment) => {
                const author = comment.user?.login || "unknown";
                const createdAt = comment.created_at || comment.updated_at || "unknown";
                return [
                  `- @${author} at ${createdAt}`,
                  trimCommentBody(comment.body)
                ].join("\n");
              });

              return [
                `Mirror activity detected on ${targetRef}.`,
                `Target URL: ${targetUrl}`,
                "",
                "### New target comments",
                rows.length > 0 ? rows.join("\n\n") : "- (none)",
                "",
                `<!-- ${MARKER_ACTIVITY}: target=${targetRef};count=${comments.length};generated=${new Date().toISOString()} -->`
              ].join("\n");
            };

            const syncCommitDigestToTarget = async ({ sourceNumber, targetNumber }) => {
              const pr = await github.rest.pulls.get({
                owner: SOURCE_OWNER,
                repo: SOURCE_REPO,
                pull_number: sourceNumber
              });

              const commits = await github.paginate(github.rest.pulls.listCommits, {
                owner: SOURCE_OWNER,
                repo: SOURCE_REPO,
                pull_number: sourceNumber,
                per_page: 100
              });

              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner: SOURCE_OWNER,
                repo: SOURCE_REPO,
                pull_number: sourceNumber,
                per_page: 100
              });

              const sourceRef = `${SOURCE_OWNER}/${SOURCE_REPO}#${sourceNumber}`;
              const headSha = pr.data.head?.sha || "";
              const digestMarkerNeedle = `<!-- ${MARKER_COMMIT_DIGEST}: source=${sourceRef};`;
              const digestBody = [
                formatCommitDigest({
                  sourceRef,
                  sourcePrUrl: pr.data.html_url,
                  headSha,
                  commits,
                  files
                }),
                "",
                `<!-- ${MARKER_COMMIT_DIGEST}: source=${sourceRef};head=${headSha};updated=${new Date().toISOString()} -->`
              ].join("\n");

              const previousBody = await upsertCommentWithMarker({
                owner: TARGET_OWNER,
                repo: TARGET_REPO,
                issueNumber: targetNumber,
                markerNeedle: digestMarkerNeedle,
                body: digestBody
              });

              const previousHeadMatch = (previousBody || "").match(/head=([0-9a-f]{7,40})/i);
              const previousHead = previousHeadMatch ? previousHeadMatch[1] : "";

              if (headSha && previousHead !== headSha) {
                await github.rest.issues.createComment({
                  owner: SOURCE_OWNER,
                  repo: SOURCE_REPO,
                  issue_number: sourceNumber,
                  body: [
                    `Mirror update: commit/file digest was refreshed on ${TARGET_OWNER}/${TARGET_REPO}#${targetNumber}.`,
                    `Target URL: https://github.com/${TARGET_OWNER}/${TARGET_REPO}/issues/${targetNumber}`,
                    `New head SHA: ${headSha}`
                  ].join("\n")
                });
                return true;
              }

              return false;
            };

            const currentSchedule = context.eventName === "schedule" ? (context.payload.schedule || "") : "";
            const manualMinutesInput = String(core.getInput("sync_recent_minutes") || "").trim();
            let syncWindowMinutes = syncConfig.defaultWindowMinutes;

            if (context.eventName === "workflow_dispatch" && manualMinutesInput) {
              const parsedMinutes = Number.parseInt(manualMinutesInput, 10);
              if (!Number.isNaN(parsedMinutes) && parsedMinutes > 0) {
                syncWindowMinutes = parsedMinutes;
              }
            }

            if (context.eventName === "schedule" && currentSchedule === FAST_SCHEDULE) {
              const burstSince = toIsoMinutesAgo(syncConfig.burstLookbackMinutes);
              const burstCandidates = await listTargetIssuesSince(burstSince);
              const burstMatches = burstCandidates.filter((targetIssue) => {
                const marker = parseMarker(targetIssue.body || "", sourceMarkerRegex);
                return marker && marker.owner === SOURCE_OWNER && marker.repo === SOURCE_REPO;
              });

              if (burstMatches.length === 0) {
                if (IS_CANONICAL_REPO) {
                  core.info("Fast sync did not find target-side markers; continuing with source-linked mirror discovery.");
                } else {
                  core.info("Fast sync skipped: no recent target-side mirror activity.");
                  return;
                }
              }

              if (burstMatches.length > 0) {
                syncWindowMinutes = syncConfig.burstWindowMinutes;
                core.info(`Fast sync enabled for ${burstMatches.length} recent mirrored target update(s).`);
              }
            }

            const sinceIso = toIsoMinutesAgo(syncWindowMinutes);
            const targetIssues = await listTargetIssuesSince(sinceIso);
            const mirroredTargetIssues = targetIssues
              .map((targetIssue) => ({ targetIssue, marker: parseMarker(targetIssue.body || "", sourceMarkerRegex) }))
              .filter(({ marker }) => marker && marker.owner === SOURCE_OWNER && marker.repo === SOURCE_REPO && Number.isInteger(marker.number));

            const sourceIssuesForDiscovery = await listSourceIssuesForDiscovery(sinceIso);
            const sourceDiscoveredMirrors = [];

            for (const sourceIssue of sourceIssuesForDiscovery) {
              let targetMarker;
              try {
                targetMarker = await resolveMirrorTargetForSource(sourceIssue.number);
              } catch (error) {
                core.warning(`Mirror target discovery skipped for source item #${sourceIssue.number}: ${error.message}`);
                continue;
              }

              if (!targetMarker || !Number.isInteger(targetMarker.number)) {
                continue;
              }

              if (targetMarker.owner !== TARGET_OWNER || targetMarker.repo !== TARGET_REPO) {
                continue;
              }

              if (targetMarker.owner === SOURCE_OWNER && targetMarker.repo === SOURCE_REPO && targetMarker.number === sourceIssue.number) {
                continue;
              }

              let targetIssue;
              try {
                const response = await github.rest.issues.get({
                  owner: TARGET_OWNER,
                  repo: TARGET_REPO,
                  issue_number: targetMarker.number
                });
                targetIssue = response.data;
              } catch (error) {
                core.warning(`Skipping source-linked mirror for #${sourceIssue.number}: target ${TARGET_OWNER}/${TARGET_REPO}#${targetMarker.number} not found (${error.message}).`);
                continue;
              }

              sourceDiscoveredMirrors.push({
                targetIssue,
                marker: {
                  owner: SOURCE_OWNER,
                  repo: SOURCE_REPO,
                  number: sourceIssue.number,
                  sourceType: targetMarker.sourceType || (sourceIssue.pull_request ? "pull_request" : "issue")
                }
              });
            }

            const mirrorsByPair = new Map();
            for (const mirror of mirroredTargetIssues) {
              const key = `${mirror.marker.number}->${mirror.targetIssue.number}`;
              mirrorsByPair.set(key, mirror);
            }
            for (const mirror of sourceDiscoveredMirrors) {
              const key = `${mirror.marker.number}->${mirror.targetIssue.number}`;
              if (!mirrorsByPair.has(key)) {
                mirrorsByPair.set(key, mirror);
              }
            }

            const mirrorsToSync = Array.from(mirrorsByPair.values());

            const recentSourcePullRequests = await listSourcePullRequestsSince(sinceIso);

            let closureChanges = 0;
            let reopenChanges = 0;
            let activityComments = 0;
            let digestChanges = 0;

            for (const { targetIssue, marker } of mirrorsToSync) {
              const sourceNumber = marker.number;
              const sourceType = marker.sourceType || "issue";
              const targetRef = `${TARGET_OWNER}/${TARGET_REPO}#${targetIssue.number}`;
              const sourceRef = `${SOURCE_OWNER}/${SOURCE_REPO}#${sourceNumber}`;

              let sourceIssue;
              try {
                sourceIssue = await getSourceIssue(sourceNumber);
              } catch (error) {
                core.warning(`Skipping ${targetRef}: source item ${sourceRef} was not found (${error.message}).`);
                continue;
              }

              const syncMarkerNeedle = `<!-- ${MARKER_SYNC}: target=${targetRef};`;
              const previousSyncBody = await upsertCommentWithMarker({
                owner: SOURCE_OWNER,
                repo: SOURCE_REPO,
                issueNumber: sourceNumber,
                markerNeedle: syncMarkerNeedle,
                body: [
                  `Mirror sync status for ${targetRef}.`,
                  `Target state: ${targetIssue.state}`,
                  `Target last update: ${targetIssue.updated_at}`,
                  `Last sync run: ${new Date().toISOString()}`,
                  `<!-- ${MARKER_SYNC}: target=${targetRef};state=${targetIssue.state};updated=${targetIssue.updated_at};sourceType=${sourceType};lastCommentId=0 -->`
                ].join("\n")
              });

              const previousLastCommentId = parseLastSeenCommentId(previousSyncBody);
              const targetComments = await github.paginate(github.rest.issues.listComments, {
                owner: TARGET_OWNER,
                repo: TARGET_REPO,
                issue_number: targetIssue.number,
                per_page: 100
              });

              const relevantNewComments = targetComments.filter((comment) => {
                if (!comment.id || comment.id <= previousLastCommentId) {
                  return false;
                }

                if ((comment.user?.type || "").toLowerCase() === "bot") {
                  return false;
                }

                return !(comment.body || "").includes(`<!-- ${MARKER_COMMIT_DIGEST}:`);
              });

              const latestCommentId = targetComments.reduce((maxId, comment) => Math.max(maxId, Number(comment.id || 0)), previousLastCommentId);
              const currentTargetLabelNames = getLabelNames(targetIssue);
              const currentTargetLabelsEncoded = encodeURIComponent(currentTargetLabelNames.join(","));
              const previousTargetLabelsEncoded = parseLastSeenEncodedLabels(previousSyncBody);

              if (previousTargetLabelsEncoded && previousTargetLabelsEncoded !== currentTargetLabelsEncoded) {
                const previousLabels = decodeMarkerValue(previousTargetLabelsEncoded)
                  .split(",")
                  .map((label) => label.trim())
                  .filter(Boolean);

                await github.rest.issues.createComment({
                  owner: SOURCE_OWNER,
                  repo: SOURCE_REPO,
                  issue_number: sourceNumber,
                  body: [
                    `Mirror update: labels changed on ${targetRef}.`,
                    `Previous labels: ${previousLabels.length > 0 ? previousLabels.join(", ") : "(none)"}`,
                    `Current labels: ${currentTargetLabelNames.length > 0 ? currentTargetLabelNames.join(", ") : "(none)"}`,
                    `Target URL: ${targetIssue.html_url}`
                  ].join("\n")
                });
              }

              if (targetIssue.state === "closed" && sourceIssue.state === "open") {
                if (sourceType === "pull_request" && sourceIssue.pull_request) {
                  await github.rest.pulls.update({
                    owner: SOURCE_OWNER,
                    repo: SOURCE_REPO,
                    pull_number: sourceNumber,
                    state: "closed"
                  });
                } else {
                  await github.rest.issues.update({
                    owner: SOURCE_OWNER,
                    repo: SOURCE_REPO,
                    issue_number: sourceNumber,
                    state: "closed",
                    state_reason: "completed"
                  });
                }

                await github.rest.issues.createComment({
                  owner: SOURCE_OWNER,
                  repo: SOURCE_REPO,
                  issue_number: sourceNumber,
                  body: [
                    `Mirror update: ${targetRef} was closed, so this source ${sourceType === "pull_request" ? "pull request" : "issue"} was closed to match.`,
                    `Target URL: ${targetIssue.html_url}`
                  ].join("\n")
                });
                closureChanges += 1;
              }

              if (targetIssue.state === "open" && sourceIssue.state === "closed") {
                if (sourceType === "pull_request" && sourceIssue.pull_request) {
                  await github.rest.pulls.update({
                    owner: SOURCE_OWNER,
                    repo: SOURCE_REPO,
                    pull_number: sourceNumber,
                    state: "open"
                  });
                } else {
                  await github.rest.issues.update({
                    owner: SOURCE_OWNER,
                    repo: SOURCE_REPO,
                    issue_number: sourceNumber,
                    state: "open"
                  });
                }

                await github.rest.issues.createComment({
                  owner: SOURCE_OWNER,
                  repo: SOURCE_REPO,
                  issue_number: sourceNumber,
                  body: [
                    `Mirror update: ${targetRef} was reopened, so this source ${sourceType === "pull_request" ? "pull request" : "issue"} was reopened to match.`,
                    `Target URL: ${targetIssue.html_url}`
                  ].join("\n")
                });
                reopenChanges += 1;
              }

              if (relevantNewComments.length > 0) {
                await github.rest.issues.createComment({
                  owner: SOURCE_OWNER,
                  repo: SOURCE_REPO,
                  issue_number: sourceNumber,
                  body: summarizeTargetComments(relevantNewComments, targetRef, targetIssue.html_url)
                });
                activityComments += 1;
              }

              await upsertCommentWithMarker({
                owner: SOURCE_OWNER,
                repo: SOURCE_REPO,
                issueNumber: sourceNumber,
                markerNeedle: syncMarkerNeedle,
                body: [
                  `Mirror sync status for ${targetRef}.`,
                  `Target state: ${targetIssue.state}`,
                  `Target last update: ${targetIssue.updated_at}`,
                  `Target labels: ${currentTargetLabelNames.length > 0 ? currentTargetLabelNames.join(", ") : "(none)"}`,
                  `Target comments seen: ${latestCommentId}`,
                  `Last sync run: ${new Date().toISOString()}`,
                  `<!-- ${MARKER_SYNC}: target=${targetRef};state=${targetIssue.state};updated=${targetIssue.updated_at};sourceType=${sourceType};lastCommentId=${latestCommentId};targetLabels=${currentTargetLabelsEncoded} -->`
                ].join("\n")
              });
            }

            for (const pullRequest of recentSourcePullRequests) {
              try {
                const targetMarker = await resolveMirrorTargetForSource(pullRequest.number);
                if (!targetMarker) {
                  continue;
                }

                if (targetMarker.owner !== TARGET_OWNER || targetMarker.repo !== TARGET_REPO) {
                  continue;
                }

                const changed = await syncCommitDigestToTarget({
                  sourceNumber: pullRequest.number,
                  targetNumber: targetMarker.number
                });

                if (changed) {
                  digestChanges += 1;
                }
              } catch (error) {
                core.warning(`Commit digest sync skipped for source PR #${pullRequest.number}: ${error.message}`);
              }
            }

            core.info(
              `Remote mirror sync finished. targetItems=${mirroredTargetIssues.length}, sourceDiscoveryCandidates=${sourceIssuesForDiscovery.length}, sourceLinkedItems=${sourceDiscoveredMirrors.length}, syncedItems=${mirrorsToSync.length}, recentSourcePrs=${recentSourcePullRequests.length}, closed=${closureChanges}, reopened=${reopenChanges}, activityComments=${activityComments}, digestUpdates=${digestChanges}`
            );
