name: Documentation Request
description: Suggest fixes, additions, or removals to the documentation.
title: "[Docs]: "
labels: ["documentation"]
projects: ["braydenanderson2014/4"]

body:
  - type: markdown
    attributes:
      value: |
        Help us improve the documentation by suggesting changes below.

  - type: dropdown
    id: request_type
    attributes:
      label: Type of request
      options:
        - Fix a mistake / typo
        - Add new documentation
        - Remove outdated/legacy documentation
        - Reorganize / restructure
        - Other
    validations:
      required: true
 
  - type: dropdown
    id: library   # unique id (alphanumeric, -, _)
    attributes:
      label: Repository / Library
      description: Select the particular repository or library of code this bug relates to.
      multiple: false          # set to true if users should be able to pick more than one
      options:
        - AVLTree
        - Arraylist
        - BinarySearchTree
        - BinaryTree
        - bPlusTree
        - bTree
        - ColorManager
        - Dictionary
        - DoubleLinkedList
        - DynamicStorageLibrary
        - EthernetConnectionChecker
        - EthernetMach2ConnectionChecker
        - ExtremeVariant
        - FenwickTree
        - Hashtable
        - HeapTree
        - iostream
        - Initializer_List
        - IntervalTree
        - iterator
        - Json
        - kdimensionalTree
        - LinkedList
        - Map
        - MathLib
        - MatrixMath
        - MbedLittleFSWrapper/src
        - MemoryManager
        - MyDictionary
        - NewArrayList (TEMP)
        - Numeric_Limits
        - OCTree
        - Operators
        - Optional
        - OrderedMap
        - Predicates
        - Properties
        - QuadTree
        - Queue
        - RTree
        - RedBlackTree
        - SDList
        - SegmentTree
        - SimpleMutex
        - SimpleThreadManager
        - SimpleVector
        - Stack
        - String
        - SuffixTree
        - Timer
        - TrieTree
        - TypeTraits
        - UnorderedMap
        - Variant
        - Other                 # optional catch-all
    # default: 0             # optional: 0-based index of the pre-selected option
    validations:
      required: true           # optional but recommended
 
  - type: input
    id: location
    attributes:
      label: Documentation location
      description: Where is this doc? (Link, file path, or section)
      placeholder: e.g., docs/getting-started.md or https://github.com/.../README.md#install
    validations:
      required: false

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested changes
      description: Describe what should be fixed, added, removed, or reorganized.
      placeholder: Be as specific as possible. Include before/after examples if helpful.
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## Program Unique ID
        - **ID**: []  
        **Program ID is only for programs with the ability to report issues.**

  - type: input
    id: program_unique_id
    attributes:
      label: Program Unique ID (optional)
      description: If this was reported from a program that provides an ID, paste it here.
      placeholder: e.g., PRG-12345
    validations:
      required: false
