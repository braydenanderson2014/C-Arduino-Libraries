name: Bug report
description: Create a report to help us improve
title: "[BUG] "
labels: ["bug", "user-reported"]
projects: ["braydenanderson2014/4"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the form below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What is the bug?
      placeholder: Clear, concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1) …
        2) …
        3) …
        4) …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened?
    validations:
      required: true

  - type: input
    id: app_version
    attributes:
      label: Application version
      placeholder: e.g., 1.0.0

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g., Windows 11

  - type: input
    id: python_version
    attributes:
      label: Python version
      placeholder: e.g., 3.11.0

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant log output or attach files.

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Drag-and-drop images or paste links.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else we should know?

  - type: markdown
    attributes:
      value: |
        ## Program Unique ID
        - **ID**: []
        **Program ID is only for programs with the ability to report issues.**

  - type: input
    id: program_unique_id
    attributes:
      label: Program Unique ID (optional)
      placeholder: e.g., PRG-12345
