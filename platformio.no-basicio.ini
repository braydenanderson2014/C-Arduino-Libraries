; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = arduino_mega2560

[env:arduino_mega2560]
# [env:d1_mini]
platform = atmelavr
# platform = platformio/espressif8266
board = megaatmega2560
# board = espduino
framework = arduino
upload_port = COM5
test_port = COM5
build_flags = -std=gnu++11
# build_flags = -D PIO_FRAMEWORK_ARDUINO_MMU_CACHE16_IRAM48

monitor_speed = 115200
lib_deps = 
	adafruit/Adafruit BusIO@^1.14.5
	adafruit/RTClib@^2.1.3
	arduino-libraries/Ethernet@^2.0.2
	arduino-libraries/SD@^1.3.0
	braydenanderson2014/SimpleVector@^1.0.6
	marcoschwartz/LiquidCrystal_I2C@^1.1.4
	braydenanderson2014/SimpleArduinoTimer
	braydenanderson2014/Hashtable
	greiman/SdFat@^2.3.0
	# adafruit/SD
	liux-pro/lz4@^0.0.2
lib_ignore =
	Json
	OrderedMap
	SDList

[env:arduino_mega2560_test]
extends = env:arduino_mega2560
test_framework = unity
test_speed = 115200
lib_deps =
	${env:arduino_mega2560.lib_deps}
	throwtheswitch/Unity@^2.6.1
